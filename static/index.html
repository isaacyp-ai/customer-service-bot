<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartShop Support</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f10;
      --surface: #1a1a1d;
      --surface2: #242428;
      --border: #2e2e34;
      --accent: #d4a853;
      --accent-dim: rgba(212, 168, 83, 0.12);
      --accent-glow: rgba(212, 168, 83, 0.25);
      --text: #e8e8ea;
      --text-dim: #888892;
      --text-muted: #55555f;
      --user-bubble: #1e2a1e;
      --user-border: #2d4a2d;
      --bot-bubble: #1a1a1d;
      --radius: 16px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(212,168,83,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(212,168,83,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .layout {
      display: flex;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .sidebar-header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .logo-text span {
      color: var(--accent);
    }

    .new-chat-btn {
      width: 100%;
      padding: 10px 14px;
      background: var(--accent-dim);
      border: 1px solid rgba(212,168,83,0.2);
      border-radius: var(--radius-sm);
      color: var(--accent);
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .new-chat-btn:hover {
      background: rgba(212,168,83,0.18);
      border-color: rgba(212,168,83,0.35);
    }

    .sidebar-section {
      padding: 16px 20px 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
    }

    .history-item {
      padding: 10px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all 0.15s;
      margin-bottom: 2px;
    }

    .history-item:hover { background: var(--surface2); color: var(--text); }
    .history-item.active { background: var(--surface2); color: var(--text); }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    .model-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-dim);
    }

    .model-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4caf7d;
      box-shadow: 0 0 6px rgba(76,175,125,0.6);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Main chat area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15,15,16,0.8);
      backdrop-filter: blur(10px);
    }

    .chat-header-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dim);
    }

    .chat-header-title strong {
      color: var(--text);
      font-weight: 600;
    }

    .status-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      padding: 40px;
      animation: fadeIn 0.5s ease;
    }

    .welcome-icon {
      width: 56px;
      height: 56px;
      background: var(--accent-dim);
      border: 1px solid rgba(212,168,83,0.25);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 4px;
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-dim);
      max-width: 380px;
      line-height: 1.6;
    }

    .suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
      width: 100%;
      max-width: 480px;
    }

    .suggestion {
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      text-align: left;
      font-family: 'Sora', sans-serif;
      transition: all 0.2s;
      line-height: 1.4;
    }

    .suggestion:hover {
      background: var(--surface2);
      border-color: rgba(212,168,83,0.3);
      color: var(--text);
      transform: translateY(-1px);
    }

    /* Message rows */
    .message-row {
      display: flex;
      gap: 14px;
      padding: 16px 0;
      animation: fadeIn 0.3s ease;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-row.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 32px;
      height: 32px;
      min-width: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      margin-top: 2px;
    }

    .avatar.bot {
      background: var(--accent);
      color: #0f0f10;
      font-size: 16px;
    }

    .avatar.user {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 13px;
    }

    .bubble {
      max-width: calc(100% - 52px);
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.7;
      position: relative;
    }

    .bubble.bot {
      background: transparent;
      color: var(--text);
      border-radius: 0 var(--radius) var(--radius) var(--radius);
      padding: 4px 0;
    }

    .bubble.user {
      background: var(--user-bubble);
      border: 1px solid var(--user-border);
      color: var(--text);
      border-radius: var(--radius) 0 var(--radius) var(--radius);
    }

    .sender-name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .bot .sender-name { color: var(--accent); }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 0;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input area ── */
    .input-area {
      padding: 20px 32px 28px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      max-width: 780px;
      margin: 0 auto;
      position: relative;
    }

    .input-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 56px 14px 18px;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      color: var(--text);
      resize: none;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.5;
      min-height: 52px;
      max-height: 160px;
      overflow-y: auto;
    }

    .input-box::placeholder { color: var(--text-muted); }

    .input-box:focus {
      border-color: rgba(212,168,83,0.4);
      box-shadow: 0 0 0 3px rgba(212,168,83,0.08);
    }

    .send-btn {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 34px;
      height: 34px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      color: #0f0f10;
    }

    .send-btn:hover { background: #e0b85e; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { background: var(--surface2); cursor: not-allowed; transform: none; color: var(--text-muted); }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
    }

    .input-hint kbd {
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">🛍</div>
        <div class="logo-text">Smart<span>Shop</span></div>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        New conversation
      </button>
    </div>

    <div class="sidebar-section">Recent</div>
    <div class="chat-history" id="chatHistory">
      <div class="history-item active">Order #12345 inquiry</div>
      <div class="history-item">Return request — jacket</div>
      <div class="history-item">Shipping delay question</div>
    </div>

    <div class="sidebar-footer">
      <div class="model-badge">
        <div class="model-dot"></div>
        <span>llama3.2:3b · local</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="chat-header">
      <div class="chat-header-title"><strong>SmartShop</strong> Customer Support</div>
      <div class="status-chip">
        <div class="model-dot"></div>
        Online
      </div>
    </div>

    <div class="messages" id="messages">
      <!-- Welcome screen shown initially -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🛍</div>
        <h2>How can we help you?</h2>
        <p>Ask about your orders, shipping status, returns, or exchanges. We're here to help.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">Where is my order #12345?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">How do I return an item?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">My package hasn't arrived</button>
          <button class="suggestion" onclick="sendSuggestion(this)">What's your refund policy?</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="inputBox"
          class="input-box"
          placeholder="Ask about orders, shipping, returns..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</div>
    </div>
  </main>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputBox = document.getElementById('inputBox');
  const sendBtn = document.getElementById('sendBtn');
  const welcomeEl = document.getElementById('welcome');
  let isTyping = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(btn) {
    inputBox.value = btn.textContent;
    sendMessage();
  }

  function newChat() {
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = 'flex';
  }

  async function sendMessage() {
    const text = inputBox.value.trim();
    if (!text || isTyping) return;

    // Hide welcome
    welcomeEl.style.display = 'none';

    // Add user message
    appendMessage('user', text);
    inputBox.value = '';
    inputBox.style.height = 'auto';

    // Show typing
    const typingRow = appendTyping();
    isTyping = true;
    sendBtn.disabled = true;

    try {
      const res = await fetch('http://localhost:8000/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      typingRow.remove();
      appendMessage('bot', data.response);
    } catch (err) {
      typingRow.remove();
      appendMessage('bot', '⚠️ Could not reach the server. Make sure the FastAPI server is running on port 8000.');
    }

    isTyping = false;
    sendBtn.disabled = false;
    inputBox.focus();
  }

  function appendMessage(role, text) {
    const row = document.createElement('div');
    row.className = `message-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'bot' ? '🛍' : 'You';
    if (role === 'user') avatar.textContent = 'U';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;

    const name = document.createElement('div');
    name.className = 'sender-name';
    name.textContent = role === 'bot' ? 'SmartShop Support' : 'You';

    const content = document.createElement('div');
    content.textContent = text;

    bubble.appendChild(name);
    bubble.appendChild(content);
    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'message-row bot';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = '🛍';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';

    const name = document.createElement('div');
    name.className = 'sender-name';
    name.textContent = 'SmartShop Support';

    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    for (let i = 0; i < 3; i++) {
      const dot = document.createElement('div');
      dot.className = 'typing-dot';
      indicator.appendChild(dot);
    }

    bubble.appendChild(name);
    bubble.appendChild(indicator);
    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }
</script>
</body>
</html>
