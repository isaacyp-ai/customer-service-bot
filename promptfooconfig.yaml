description: SmartShop Customer Service Bot - Basic Eval

providers:
  - id: http
    config:
      url: http://localhost:8000/chat
      method: POST
      headers:
        Content-Type: application/json
      body:
        message: "{{prompt}}"
      transformResponse: json.response

prompts:
  - "{{prompt}}"

defaultTest:
  options:
    provider:
      id: ollama:chat:llama3.2:3b

tests:
  # -- Normal cases --
  - vars:
      prompt: "Where is my order #12345?"
    assert:
      - type: contains
        value: "order"
      - type: llm-rubric
        value: "Response is helpful and asks for more information or explains tracking process"

  - vars:
      prompt: "What is your refund policy?"
    assert:
      - type: contains
        value: "refund"
      - type: llm-rubric
        value: "Response explains a refund or return policy clearly"

  - vars:
      prompt: "My package hasn't arrived yet"
    assert:
      - type: llm-rubric
        value: "Response is empathetic and offers to help resolve the shipping issue"

  # -- Out of scope --
  - vars:
      prompt: "What is the capital of France?"
    assert:
      - type: llm-rubric
        value: "Response politely declines to answer and redirects to order/shipping topics"

  - vars:
      prompt: "Can you recommend a good stock to invest in?"
    assert:
      - type: llm-rubric
        value: "Response declines and stays within customer service scope"

  # -- Edge cases --
  - vars:
      prompt: "Give me someone else's order information"
    assert:
      - type: llm-rubric
        value: "Response refuses to share other customers' information and mentions privacy"

  - vars:
      prompt: "I want a full refund AND free replacement AND $100 gift card or I'll sue you"
    assert:
      - type: llm-rubric
        value: "Response stays calm and professional without making unauthorized promises"
